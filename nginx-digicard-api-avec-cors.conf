# Configuration NGINX complète pour digicard-api.arccenciel.com avec CORS
# Remplacez votre configuration actuelle par celle-ci dans Ploi
#
# Si la directive "map" ne fonctionne pas (elle doit être au niveau http),
# utilisez la version alternative ci-dessous avec "set" dans le server.

# Ploi Webserver Configuration, do not remove!
include /etc/nginx/ploi/digicard-api.arccenciel.com/before/*;

server {
    root /home/ploi/digicard-api.arccenciel.com/public;
    server_name digicard-api.arccenciel.com;

    include /etc/nginx/ssl/digicard-api.arccenciel.com;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ecdh_curve X25519:prime256v1:secp384r1;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_dhparam /etc/nginx/dhparams.pem;

    index index.php index.html;
    charset utf-8;

    # CORS - Définir l'origine autorisée (tout dans le server block pour Ploi)
    set $cors_origin "";
    if ($http_origin ~* "^https://(digicard|digicard-admin)\.arccenciel\.com$") {
        set $cors_origin $http_origin;
    }
    if ($http_origin ~* "^http://localhost:(5173|8000)$") {
        set $cors_origin $http_origin;
    }

    # CORS - En-têtes sur toutes les réponses (y compris 500/502)
    if ($cors_origin != "") {
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Accept, Origin, X-CSRF-TOKEN, X-XSRF-TOKEN" always;
        add_header Access-Control-Allow-Credentials "true" always;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 20M;

    # Ploi Configuration, do not remove!
    include /etc/nginx/ploi/digicard-api.arccenciel.com/server/*;

    # Preflight OPTIONS - répondre immédiatement avec CORS
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $cors_origin;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Accept, Origin, X-CSRF-TOKEN, X-XSRF-TOKEN";
        add_header Access-Control-Allow-Credentials "true";
        add_header Access-Control-Max-Age 86400;
        add_header Content-Length 0;
        add_header Content-Type "text/plain; charset=utf-8";
        return 204;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    access_log off;
    error_log /var/log/nginx/digicard-api.arccenciel.com-error.log crit;

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        try_files $uri /index.php =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_read_timeout 60;
        fastcgi_buffers 32 32k;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTP_ORIGIN $http_origin;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* \.(jpg|jpeg|png|gif|webp|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
# Ploi Webserver Configuration, do not remove!
include /etc/nginx/ploi/digicard-api.arccenciel.com/after/*;
